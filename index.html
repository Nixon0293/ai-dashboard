<!DOCTYPE html>
<html>
<head>
    <title>Дашборд заказов</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        h1 { color: #333; }
        canvas { max-width: 800px; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>📦 Дашборд заказов</h1>
    <canvas id="ordersChart" width="800" height="400"></canvas>

    <script>
        const SUPABASE_URL = "https://ibvlgosbjpntuorpwyiy.supabase.co";
        const SUPABASE_KEY = "sb_publishable_9Y0g__k5__PGW23QrLRbYg_OyGlxuba";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadChart() {
            const { data, error } = await supabaseClient.from("orders").select("created_at, total_sum");
            if (error) {
                console.error("Ошибка Supabase:", error);
                return;
            }
            
            const ordersByDate = {};
            data.forEach(order => {
                const date = order.created_at?.slice(0, 10) || "без даты";
                ordersByDate[date] = (ordersByDate[date] || 0) + order.total_sum;
            });
            
            const dates = Object.keys(ordersByDate);
            const totals = Object.values(ordersByDate);
            
            new Chart(document.getElementById("ordersChart"), {
                type: 'bar',
                data: {
                    labels: dates,
                    datasets: [{
                        label: 'Сумма заказов',
                        data: totals,
                        backgroundColor: 'orange'
                    }]
                }
            });
        }
        
        loadChart();
    </script>
</body>
</html>
